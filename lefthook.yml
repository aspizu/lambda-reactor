pre-commit:
    parallel: true
    jobs:
        - name: format
          glob: "*.{ts,tsx,js,json,yml,yaml,md}"
          run: npx prettier -w {staged_files} && git add {staged_files}
        - name: lint
          glob: "*.{ts,tsx}"
          run: npx eslint --fix {staged_files} && git add {staged_files}

pre-push:
    jobs:
        - name: check
          run: npm run check
        - name: test
          run: npm test -- --run
